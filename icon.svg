<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#00CEFF"/>
    </linearGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" fill="#0D0D0D"/>

  <!-- Crossed-out eye — centered -->
  <g transform="translate(256,232)">
    <!-- Eye shape -->
    <path d="M-100,0 C-60,-60 60,-60 100,0 C60,60 -60,60 -100,0 Z" fill="none" stroke="url(#g1)" stroke-width="5" opacity="0.85"/>
    <!-- Iris -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="url(#g1)" stroke-width="4" opacity="0.7"/>
    <!-- Pupil -->
    <circle cx="0" cy="0" r="14" fill="url(#g1)" opacity="0.6"/>
    <!-- Strike-through line -->
    <line x1="-80" y1="60" x2="80" y2="-60" stroke="#FF5F57" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- SHYFT text -->
  <text x="256" y="380" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="56" font-weight="800" letter-spacing="8" fill="url(#g1)" opacity="0.85">SHYFT</text>

  <!-- Subtle tagline -->
  <text x="256" y="416" text-anchor="middle" font-family="-apple-system, SF Pro Display, Helvetica Neue" font-size="16" font-weight="400" letter-spacing="4" fill="white" opacity="0.25">BROWSER</text>
</svg>
